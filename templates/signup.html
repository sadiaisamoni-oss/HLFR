{% extends 'base.html' %}

{% block title %}Sign Up - Hyper-Local Food Rescue{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h4 fw-bold text-success">Create your account</h1>
                    <p class="text-muted mb-0">Join the community and start rescuing food today.</p>
                </div>
                <form class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="firstName">First name</label>
                        <input class="form-control" id="firstName" name="firstName" type="text" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="lastName">Last name</label>
                        <input class="form-control" id="lastName" name="lastName" type="text" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-control" id="email" name="email" type="email" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="phone">Phone</label>
                        <input class="form-control" id="phone" name="phone" type="tel" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="address">Address</label>
                        <input class="form-control" id="address" name="address" type="text" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" type="password" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="confirmPassword">Confirm password</label>
                        <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" required>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" id="terms" name="terms" type="checkbox" required>
                            <label class="form-check-label" for="terms">I agree to the community guidelines and terms.</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-success w-100" type="submit">Create account</button>
                    </div>
                </form>
                <div class="text-center small text-muted mt-3">
                    Already have an account? <a class="text-decoration-none" href="{% url 'signin' %}">Sign in</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
