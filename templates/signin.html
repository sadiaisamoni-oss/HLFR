{% extends 'base.html' %}

{% block title %}Sign In - Hyper-Local Food Rescue{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h4 fw-bold text-success">Welcome back</h1>
                    <p class="text-muted mb-0">Sign in to manage your listings and pickups.</p>
                </div>
                <form class="row g-3" method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next|default:'' }}">
                    <div class="col-12">
                        <label class="form-label" for="email">Email address</label>
                        <input class="form-control" id="email" name="email" type="email" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" type="password" required>
                    </div>
                    <div class="col-12 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" id="remember" name="remember" type="checkbox">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <a class="small text-decoration-none" href="{% url 'password_reset' %}">Forgot password?</a>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-success w-100" type="submit">Sign in</button>
                    </div>
                </form>
                <div class="text-center small text-muted mt-3">
                    New here? <a class="text-decoration-none" href="{% url 'signup' %}">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
