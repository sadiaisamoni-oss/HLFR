{% extends 'base.html' %}

{% block title %}Reset Password - Hyper-Local Food Rescue{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <h1 class="h4 fw-bold text-success mb-2">Reset your password</h1>
                <p class="text-muted">Enter your account email and we will send you a password reset link.</p>
                <form method="post" class="row g-3">
                    {% csrf_token %}
                    <div class="col-12">
                        <label for="id_email" class="form-label">Email address</label>
                        <input type="email" name="email" autocomplete="email" maxlength="254" required id="id_email" class="form-control">
                    </div>
                    <div class="col-12 d-grid">
                        <button class="btn btn-success" type="submit">Send reset link</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
