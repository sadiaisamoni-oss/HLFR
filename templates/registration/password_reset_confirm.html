{% extends 'base.html' %}

{% block title %}Set New Password - Hyper-Local Food Rescue{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <h1 class="h4 fw-bold text-success mb-3">Set a new password</h1>
                {% if validlink %}
                <form method="post" class="row g-3">
                    {% csrf_token %}
                    <div class="col-12">
                        <label for="id_new_password1" class="form-label">New password</label>
                        <input type="password" name="new_password1" autocomplete="new-password" required id="id_new_password1" class="form-control">
                    </div>
                    <div class="col-12">
                        <label for="id_new_password2" class="form-label">Confirm new password</label>
                        <input type="password" name="new_password2" autocomplete="new-password" required id="id_new_password2" class="form-control">
                    </div>
                    <div class="col-12 d-grid">
                        <button class="btn btn-success" type="submit">Update password</button>
                    </div>
                </form>
                {% else %}
                <div class="alert alert-danger mb-0">This reset link is invalid or has expired. Please request a new one.</div>
                {% endif %}
            </div>
        </div>
    </div>
</section>
{% endblock %}
