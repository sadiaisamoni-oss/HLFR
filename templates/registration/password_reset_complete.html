{% extends 'base.html' %}

{% block title %}Password Updated - Hyper-Local Food Rescue{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">
                <h1 class="h4 fw-bold text-success mb-2">Password updated</h1>
                <p class="text-muted mb-3">Your password has been reset successfully.</p>
                <a class="btn btn-success" href="{% url 'signin' %}">Go to sign in</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
